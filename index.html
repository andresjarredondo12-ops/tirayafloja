<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Tug-of-War Pro</title>
    <style>
        :root {
            --p1-color: #4a90e2;
            --p2-color: #f5a623;
            --bg-color: #e0f7fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background: var(--bg-color);
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
        }

        /* --- MENÚ INICIAL --- */
        #menu {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: linear-gradient(135deg, #6dd5ed, #2193b0);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.2);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        input {
            font-size: 1.2rem;
            padding: 12px;
            margin: 10px;
            border-radius: 10px;
            border: none;
            width: 200px;
            text-align: center;
        }

        .ageBtn {
            font-size: 1.2rem;
            padding: 15px 30px;
            margin: 8px;
            border: none;
            border-radius: 50px;
            background: #fff;
            color: #2193b0;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .ageBtn:active { transform: scale(0.95); }

        /* --- ESCENARIO DE JUEGO --- */
        #game {
            display: none;
            grid-template-rows: 1fr 250px;
            height: 100vh;
        }

        #battle-area {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            align-items: center;
            padding: 20px;
        }

        .player-ui {
            background: white;
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .q-text { font-size: 2.5rem; font-weight: bold; color: #333; }
        .a-slot { 
            font-size: 2rem; 
            min-height: 50px; 
            background: #f0f0f0; 
            border-radius: 10px;
            line-height: 50px;
        }

        /* --- LA CUERDA Y PERSONAJES --- */
        #arena {
            position: relative;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #rope-visual {
            position: absolute;
            width: 120%;
            height: 12px;
            background: #8b4513;
            border-radius: 10px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .char {
            position: absolute;
            font-size: 80px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.2));
        }

        #char1 { left: 10%; transform-origin: bottom center; }
        #char2 { right: 10%; transform-origin: bottom center; }

        /* --- TECLADOS --- */
        #keyboards {
            display: flex;
            justify-content: space-around;
            padding: 10px;
            background: rgba(255,255,255,0.5);
        }

        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            width: 280px;
        }

        .btn {
            padding: 15px;
            font-size: 1.5rem;
            border: none;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            box-shadow: 0 3px 0 #ccc;
        }

        .btn:active { transform: translateY(3px); box-shadow: none; }
        .btn-ok { background: #4caf50; color: white; grid-column: span 2; }
        .btn-del { background: #ff5252; color: white; }

        /* --- ANIMACIONES --- */
        .pull-left { animation: leanLeft 0.5s ease; }
        .pull-right { animation: leanRight 0.5s ease; }

        @keyframes leanLeft {
            0%, 100% { transform: rotate(0deg) translateX(0); }
            50% { transform: rotate(-15deg) translateX(-20px); }
        }

        @keyframes leanRight {
            0%, 100% { transform: rotate(0deg) translateX(0); }
            50% { transform: rotate(15deg) translateX(20px); }
        }

        #victory-screen {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            color: gold;
            text-align: center;
        }

        .retry-btn {
            margin-top: 20px;
            padding: 20px 50px;
            font-size: 2rem;
            background: #ffcc00;
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }

    </style>
</head>
<body>

<div id="menu">
    <div class="card">
        <h1>🏆 Tira y Afloja Matemático</h1>
        <div style="display:flex; gap:20px; margin-bottom:20px;">
            <div>
                <small>Jugador Azul</small><br>
                <input id="n1" value="Profe Juan">
            </div>
            <div>
                <small>Jugador Naranja</small><br>
                <input id="n2" value="Estudiante">
            </div>
        </div>
        <h2>Selecciona Nivel</h2>
        <button class="ageBtn" onclick="init(1)">🔢 Básico (Sumas 1-10)</button>
        <button class="ageBtn" onclick="init(2)">➕ Medio (Sumas/Restas)</button>
        <button class="ageBtn" onclick="init(3)">✖️ Experto (Tablas)</button>
    </div>
</div>

<div id="game">
    <div id="battle-area">
        <div class="player-ui" style="border-top: 8px solid var(--p1-color)">
            <b id="label1">P1</b>
            <div id="q1" class="q-text">--</div>
            <div id="a1" class="a-slot"></div>
        </div>

        <div id="arena">
            <div id="rope-visual"></div>
            <div id="char1" class="char">👦</div>
            <div id="char2" class="char">👧</div>
        </div>

        <div class="player-ui" style="border-top: 8px solid var(--p2-color)">
            <b id="label2">P2</b>
            <div id="q2" class="q-text">--</div>
            <div id="a2" class="a-slot"></div>
        </div>
    </div>

    <div id="keyboards">
        <div class="numpad" id="pad1"></div>
        <div class="numpad" id="pad2"></div>
    </div>
</div>

<div id="victory-screen">
    <h1 id="win-text">¡GANADOR!</h1>
    <button class="retry-btn" onclick="location.reload()">Jugar de nuevo 🔄</button>
</div>

<script>
    let config = { level: 1, pos: 0, target: 240 };
    let p1 = { name: "", ans: "", correct: 0 };
    let p2 = { name: "", ans: "", correct: 0 };

    // --- SONIDOS (Web Audio API) ---
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playNote(freq, type, duration) {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + duration);
    }

    function soundCorrect() { playNote(600, 'sine', 0.3); playNote(800, 'sine', 0.5); }
    function soundError() { playNote(150, 'sawtooth', 0.3); }
    
    // Música de fondo simple
    setInterval(() => {
        if(document.getElementById('game').style.display === 'grid') {
            playNote(261.63, 'triangle', 0.1); // Do
        }
    }, 2000);

    function init(lvl) {
        config.level = lvl;
        p1.name = document.getElementById('n1').value;
        p2.name = document.getElementById('n2').value;
        document.getElementById('label1').innerText = p1.name;
        document.getElementById('label2').innerText = p2.name;
        
        document.getElementById('menu').style.display = 'none';
        document.getElementById('game').style.display = 'grid';
        
        renderPad('pad1', 1);
        renderPad('pad2', 2);
        
        genQ(1); genQ(2);
    }

    function renderPad(id, player) {
        const container = document.getElementById(id);
        for(let i=1; i<=9; i++) {
            container.innerHTML += `<button class="btn" onclick="press(${player},${i})">${i}</button>`;
        }
        container.innerHTML += `<button class="btn btn-del" onclick="del(${player})">⌫</button>`;
        container.innerHTML += `<button class="btn" onclick="press(${player},0)">0</button>`;
        container.innerHTML += `<button class="btn btn-ok" onclick="check(${player})">OK</button>`;
    }

    function genQ(p) {
        let a, b, txt, res;
        if(config.level === 1) {
            a = Math.floor(Math.random()*6); b = Math.floor(Math.random()*5);
            txt = `${a}+${b}`; res = a+b;
        } else if(config.level === 2) {
            a = Math.floor(Math.random()*20)+5; b = Math.floor(Math.random()*15);
            const op = Math.random() > 0.5;
            txt = op ? `${a}+${b}` : `${a}-${b}`;
            res = op ? a+b : a-b;
        } else {
            a = Math.floor(Math.random()*8)+2; b = Math.floor(Math.random()*9)+1;
            txt = `${a}×${b}`; res = a*b;
        }
        
        document.getElementById(`q${p}`).innerText = txt;
        document.getElementById(`q${p}`).dataset.res = res;
        if(p===1) p1.ans = ""; else p2.ans = "";
        updateUI();
    }

    function press(p, n) {
        if(p===1 && p1.ans.length < 3) p1.ans += n;
        if(p===2 && p2.ans.length < 3) p2.ans += n;
        updateUI();
    }

    function del(p) {
        if(p===1) p1.ans = p1.ans.slice(0,-1);
        else p2.ans = p2.ans.slice(0,-1);
        updateUI();
    }

    function updateUI() {
        document.getElementById('a1').innerText = p1.ans;
        document.getElementById('a2').innerText = p2.ans;
    }

    function check(p) {
        const qEl = document.getElementById(`q${p}`);
        const userAns = p === 1 ? p1.ans : p2.ans;
        
        if(userAns === qEl.dataset.res) {
            soundCorrect();
            move(p);
            genQ(p);
        } else {
            soundError();
            if(p===1) p1.ans = ""; else p2.ans = "";
            updateUI();
            // Feedback visual error
            qEl.parentElement.style.background = "#ffebee";
            setTimeout(() => qEl.parentElement.style.background = "white", 300);
        }
    }

    function move(p) {
        const step = 45;
        if(p === 1) {
            config.pos -= step;
            document.getElementById('char1').classList.add('pull-left');
            setTimeout(() => document.getElementById('char1').classList.remove('pull-left'), 500);
        } else {
            config.pos += step;
            document.getElementById('char2').classList.add('pull-right');
            setTimeout(() => document.getElementById('char2').classList.remove('pull-right'), 500);
        }

        const rope = document.getElementById('rope-visual');
        const c1 = document.getElementById('char1');
        const c2 = document.getElementById('char2');

        rope.style.transform = `translateX(${config.pos}px)`;
        c1.style.transform = `translateX(${config.pos}px)`;
        c2.style.transform = `translateX(${config.pos}px)`;

        if(Math.abs(config.pos) >= config.target) {
            endGame(p === 1 ? p1.name : p2.name);
        }
    }

    function endGame(winner) {
        const screen = document.getElementById('victory-screen');
        screen.style.display = 'flex';
        document.getElementById('win-text').innerHTML = `🎉 ¡VICTORIA!<br><span style="color:white; font-size:4rem">${winner}</span>`;
        
        // Efecto confeti simple
        for(let i=0; i<30; i++) {
            playNote(400 + (i*20), 'sine', 0.1);
        }
    }
</script>

</body>
</html>
