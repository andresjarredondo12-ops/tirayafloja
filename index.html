<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Tug-of-War Pro</title>
    <style>
        :root {
            --p1-color: #4a90e2;
            --p2-color: #f5a623;
            --bg-color: #e0f7fa;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: var(--bg-color);
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- MENÚ INICIAL --- */
        #menu {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: linear-gradient(135deg, #6dd5ed, #2193b0);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .card {
            background: rgba(255, 255, 255, 0.2);
            padding: 2rem;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            text-align: center;
            max-width: 90%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .player-setup {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .p-input-group {
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 15px;
        }

        input {
            font-size: 1rem;
            padding: 8px;
            margin: 5px;
            border-radius: 8px;
            border: none;
            width: 120px;
        }

        select {
            padding: 8px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }

        .ageBtn {
            font-size: 1.1rem;
            padding: 12px 20px;
            margin: 5px;
            border: none;
            border-radius: 50px;
            background: #fff;
            color: #2193b0;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .ageBtn:hover { transform: scale(1.05); }

        /* --- LAYOUT DE JUEGO --- */
        #game {
            display: none;
            flex-direction: column;
            height: 100%;
            width: 100%;
        }

        #top-section {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 2fr 1fr; /* Más espacio a la arena */
            align-items: center;
            padding: 10px;
            gap: 10px;
            max-height: 40%;
        }

        .player-ui {
            background: white;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 10; /* Asegura que estén por encima del fondo */
        }

        .q-text { font-size: 2rem; font-weight: bold; color: #333; margin-bottom: 5px; }
        .a-slot { 
            font-size: 1.8rem; 
            min-height: 45px; 
            background: #eee; 
            border-radius: 8px;
            border: 2px solid #ddd;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #arena {
            position: relative;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* Evita que los niños salgan del área central */
            background: rgba(0,0,0,0.03);
            border-radius: 20px;
        }

        #rope-visual {
            position: absolute;
            width: 140%;
            height: 8px;
            background: #8b4513;
            border-radius: 10px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .char {
            position: absolute;
            font-size: 60px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 5;
        }

        #char1 { left: 20%; }
        #char2 { right: 20%; }

        /* --- TECLADOS --- */
        #keyboards {
            flex: 1;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            background: rgba(255,255,255,0.4);
            padding: 10px;
            gap: 10px;
        }

        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            width: 100%;
            max-width: 280px;
        }

        .btn {
            aspect-ratio: 1 / 1;
            font-size: 1.4rem;
            border: none;
            border-radius: 12px;
            background: white;
            box-shadow: 0 4px 0 #bbb;
            font-weight: bold;
            cursor: pointer;
        }

        .btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #bbb; }
        .btn-ok { background: #4caf50; color: white; aspect-ratio: auto; grid-column: span 2; }
        .btn-del { background: #ff5252; color: white; }

        #victory-screen {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            color: gold;
            text-align: center;
        }

        @media (max-height: 500px) {
            .q-text { font-size: 1.4rem; }
            .btn { font-size: 1.1rem; }
            .char { font-size: 45px; }
            #arena { height: 80px; }
        }
    </style>
</head>
<body>

<div id="menu">
    <div class="card">
        <h1>🎮 Tira y Afloja Math</h1>
        
        <div class="player-setup">
            <div class="p-input-group">
                <input id="n1" placeholder="Nombre P1" value="Ana">
                <select id="g1">
                    <option value="👧">Niña 👧</option>
                    <option value="👦">Niño 👦</option>
                </select>
            </div>
            <div class="p-input-group">
                <input id="n2" placeholder="Nombre P2" value="Beto">
                <select id="g2">
                    <option value="👦" selected>Niño 👦</option>
                    <option value="👧">Niña 👧</option>
                </select>
            </div>
        </div>

        <h3>Elige el nivel:</h3>
        <button class="ageBtn" onclick="init(1)">🌟 Inicial (1-30)</button>
        <button class="ageBtn" onclick="init(2)">🚀 Medio (+ / -)</button>
        <button class="ageBtn" onclick="init(3)">🏆 Maestro (Tablas)</button>
    </div>
</div>

<div id="game">
    <div id="top-section">
        <div class="player-ui" id="ui1">
            <small id="label1">P1</small>
            <div id="q1" class="q-text">--</div>
            <div id="a1" class="a-slot"></div>
        </div>

        <div id="arena">
            <div id="rope-visual"></div>
            <div id="char1" class="char">👧</div>
            <div id="char2" class="char">👦</div>
        </div>

        <div class="player-ui" id="ui2">
            <small id="label2">P2</small>
            <div id="q2" class="q-text">--</div>
            <div id="a2" class="a-slot"></div>
        </div>
    </div>

    <div id="keyboards">
        <div class="numpad" id="pad1"></div>
        <div class="numpad" id="pad2"></div>
    </div>
</div>

<div id="victory-screen">
    <h1 id="win-text">¡GANADOR!</h1>
    <button class="ageBtn" style="padding: 20px 40px; font-size: 1.5rem;" onclick="location.reload()">REINTENTAR 🔄</button>
</div>

<script>
    let config = { level: 1, pos: 0, target: 120 }; // Target reducido para no tapar paneles
    let p1 = { name: "", ans: "", res: 0 };
    let p2 = { name: "", ans: "", res: 0 };

    function speak(texto) {
        const msg = new SpeechSynthesisUtterance(texto);
        msg.lang = 'es-ES';
        window.speechSynthesis.speak(msg);
    }

    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(f, t, d) {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = t; o.frequency.value = f;
        g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + d);
        o.connect(g); g.connect(ctx.destination);
        o.start(); o.stop(ctx.currentTime + d);
    }

    function init(lvl) {
        config.level = lvl;
        p1.name = document.getElementById('n1').value || "Jugador 1";
        p2.name = document.getElementById('n2').value || "Jugador 2";
        
        // Asignar Avatares
        document.getElementById('char1').innerText = document.getElementById('g1').value;
        document.getElementById('char2').innerText = document.getElementById('g2').value;

        document.getElementById('label1').innerText = p1.name;
        document.getElementById('label2').innerText = p2.name;
        
        document.getElementById('menu').style.display = 'none';
        document.getElementById('game').style.display = 'flex';
        
        renderPad('pad1', 1);
        renderPad('pad2', 2);
        genQ(1); genQ(2);
        
        setInterval(() => {
            if(document.getElementById('game').style.display === 'flex') 
                playSound(220, 'triangle', 0.1);
        }, 4000);
    }

    function renderPad(id, p) {
        const container = document.getElementById(id);
        container.innerHTML = ""; // Limpiar antes de renderizar
        for(let i=1; i<=9; i++) {
            container.innerHTML += `<button class="btn" onclick="press(${p},${i})">${i}</button>`;
        }
        container.innerHTML += `<button class="btn btn-del" onclick="del(${p})">⌫</button>`;
        container.innerHTML += `<button class="btn" onclick="press(${p},0)">0</button>`;
        container.innerHTML += `<button class="btn btn-ok" onclick="check(${p})">OK</button>`;
    }

    function genQ(p) {
        let txt, res;
        const r = Math.random();

        if(config.level === 1) {
            if(r > 0.5) {
                let a = Math.floor(Math.random() * 15);
                let b = Math.floor(Math.random() * 10);
                txt = `${a}+${b}`; res = a + b;
            } else {
                let start = Math.floor(Math.random() * 20);
                txt = `${start}, ${start+1}, ?`; res = start + 2;
            }
        } else if(config.level === 2) {
            let a = Math.floor(Math.random() * 40) + 10;
            let b = Math.floor(Math.random() * 20) + 1;
            if(r > 0.5) { txt = `${a}+${b}`; res = a+b; }
            else { txt = `${a}-${b}`; res = a-b; }
        } else {
            let a = Math.floor(Math.random() * 8) + 2;
            let b = Math.floor(Math.random() * 9) + 1;
            txt = `${a}×${b}`; res = a * b;
        }

        if(p === 1) { p1.res = res; p1.ans = ""; } 
        else { p2.res = res; p2.ans = ""; }
        
        document.getElementById(`q${p}`).innerText = txt;
        updateUI();
    }

    function press(p, n) {
        if(p === 1 && p1.ans.length < 3) p1.ans += n;
        if(p === 2 && p2.ans.length < 3) p2.ans += n;
        updateUI();
    }

    function del(p) {
        if(p === 1) p1.ans = p1.ans.slice(0,-1);
        else p2.ans = p2.ans.slice(0,-1);
        updateUI();
    }

    function updateUI() {
        document.getElementById('a1').innerText = p1.ans;
        document.getElementById('a2').innerText = p2.ans;
    }

    function check(p) {
        const currentAns = (p === 1 ? p1.ans : p2.ans);
        if(currentAns === "") return;

        const val = parseInt(currentAns);
        const correctVal = (p === 1 ? p1.res : p2.res);
        const name = (p === 1 ? p1.name : p2.name);

        if(val === correctVal) {
            playSound(800, 'sine', 0.2);
            move(p);
            genQ(p);
        } else {
            playSound(150, 'sawtooth', 0.4);
            if(p === 1) p1.ans = ""; else p2.ans = "";
            const ui = document.getElementById(`ui${p}`);
            ui.style.background = "#ffcccc";
            setTimeout(() => ui.style.background = "white", 400);
            updateUI();
        }
    }

    function move(p) {
        const step = 30; // Tamaño del tirón
        config.pos += (p === 1 ? -step : step);
        
        const rope = document.getElementById('rope-visual');
        const c1 = document.getElementById('char1');
        const c2 = document.getElementById('char2');

        const transform = `translateX(${config.pos}px)`;
        
        // Aplicar movimiento
        rope.style.transform = transform;
        c1.style.transform = transform + (p === 1 ? ' rotate(-15deg)' : '');
        c2.style.transform = transform + (p === 2 ? ' rotate(15deg)' : '');

        // Volver a posición normal
        setTimeout(() => {
            c1.style.transform = transform;
            c2.style.transform = transform;
        }, 400);

        // Verificar victoria
        if(Math.abs(config.pos) >= config.target) {
            const winner = (config.pos < 0 ? p1.name : p2.name);
            document.getElementById('win-text').innerHTML = `⭐ ¡VICTORIA! ⭐<br>${winner}`;
            document.getElementById('victory-screen').style.display = 'flex';
            speak("¡Felicidades " + winner + "! Eres un genio de las matemáticas.");
        }
    }
</script>
</body>
</html>
