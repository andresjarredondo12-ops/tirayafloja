<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Tug-of-War Pro</title>
    <style>
        :root {
            --p1-color: #4a90e2;
            --p2-color: #f5a623;
            --bg-color: #e0f7fa;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: var(--bg-color);
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- MENÚ INICIAL --- */
        #menu {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: linear-gradient(135deg, #6dd5ed, #2193b0);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .card {
            background: rgba(255, 255, 255, 0.2);
            padding: 2rem;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            text-align: center;
            max-width: 90%;
        }

        input {
            font-size: 1.2rem;
            padding: 10px;
            margin: 10px;
            border-radius: 10px;
            border: none;
            width: 150px;
        }

        .ageBtn {
            font-size: 1.1rem;
            padding: 12px 20px;
            margin: 5px;
            border: none;
            border-radius: 50px;
            background: #fff;
            color: #2193b0;
            font-weight: bold;
            cursor: pointer;
        }

        /* --- LAYOUT DE JUEGO (RESPONSIVO) --- */
        #game {
            display: none;
            flex-direction: column;
            height: 100%;
            width: 100%;
        }

        /* Área superior: Preguntas y Cuerda */
        #top-section {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr;
            align-items: center;
            padding: 10px;
            gap: 10px;
        }

        .player-ui {
            background: white;
            border-radius: 15px;
            padding: 10px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .q-text { font-size: 2rem; font-weight: bold; color: #333; margin-bottom: 5px; }
        .a-slot { 
            font-size: 1.8rem; 
            min-height: 40px; 
            background: #eee; 
            border-radius: 8px;
            border: 2px solid #ddd;
        }

        #arena {
            position: relative;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #rope-visual {
            position: absolute;
            width: 200%;
            height: 8px;
            background: #8b4513;
            border-radius: 10px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .char {
            position: absolute;
            font-size: 50px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #char1 { left: 15%; }
        #char2 { right: 15%; }

        /* Área inferior: Teclados (Se ajustan solos) */
        #keyboards {
            flex: 1;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            background: rgba(255,255,255,0.4);
            padding: 10px;
            gap: 20px;
        }

        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            width: 100%;
            max-width: 300px; /* Para que no se deformen en PC */
        }

        .btn {
            aspect-ratio: 1 / 1;
            font-size: 1.4rem;
            border: none;
            border-radius: 10px;
            background: white;
            box-shadow: 0 3px 0 #bbb;
            font-weight: bold;
        }

        .btn:active { transform: translateY(2px); box-shadow: none; }
        .btn-ok { background: #4caf50; color: white; aspect-ratio: auto; grid-column: span 2; }
        .btn-del { background: #ff5252; color: white; }

        /* Pantalla de Victoria */
        #victory-screen {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            color: gold;
        }

        @media (max-height: 500px) {
            .q-text { font-size: 1.2rem; }
            .btn { font-size: 1rem; padding: 5px; }
            .char { font-size: 40px; }
        }
    </style>
</head>
<body>

<div id="menu">
    <div class="card">
        <h1>🎮 Tira y Afloja</h1>
        <div style="margin-bottom:15px;">
            <input id="n1" placeholder="Jugador 1" value="Ana">
            <input id="n2" placeholder="Jugador 2" value="Beto">
        </div>
        <h3>Elige el nivel:</h3>
        <button class="ageBtn" onclick="init(1)">🌟 Inicial (1 al 30)</button>
        <button class="ageBtn" onclick="init(2)">🚀 Medio (Sumas/Restas)</button>
        <button class="ageBtn" onclick="init(3)">🏆 Maestro (Tablas)</button>
    </div>
</div>

<div id="game">
    <div id="top-section">
        <div class="player-ui" id="ui1">
            <small id="label1">P1</small>
            <div id="q1" class="q-text">--</div>
            <div id="a1" class="a-slot"></div>
        </div>

        <div id="arena">
            <div id="rope-visual"></div>
            <div id="char1" class="char">👧</div>
            <div id="char2" class="char">👦</div>
        </div>

        <div class="player-ui" id="ui2">
            <small id="label2">P2</small>
            <div id="q2" class="q-text">--</div>
            <div id="a2" class="a-slot"></div>
        </div>
    </div>

    <div id="keyboards">
        <div class="numpad" id="pad1"></div>
        <div class="numpad" id="pad2"></div>
    </div>
</div>

<div id="victory-screen">
    <h1 id="win-text">¡GANADOR!</h1>
    <button class="ageBtn" style="padding: 20px 40px; font-size: 1.5rem;" onclick="location.reload()">REINTENTAR 🔄</button>
</div>

<script>
    let config = { level: 1, pos: 0, target: 180 };
    let p1 = { name: "", ans: "", res: 0 };
    let p2 = { name: "", ans: "", res: 0 };

    // --- SINTETIZADOR DE VOZ ---
    function speak(texto) {
        const msg = new SpeechSynthesisUtterance(texto);
        msg.lang = 'es-ES';
        msg.rate = 1;
        window.speechSynthesis.speak(msg);
    }

    // --- EFECTOS DE SONIDO ---
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(f, t, d) {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = t; o.frequency.value = f;
        g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + d);
        o.connect(g); g.connect(ctx.destination);
        o.start(); o.stop(ctx.currentTime + d);
    }

    function init(lvl) {
        config.level = lvl;
        p1.name = document.getElementById('n1').value || "Jugador 1";
        p2.name = document.getElementById('n2').value || "Jugador 2";
        document.getElementById('label1').innerText = p1.name;
        document.getElementById('label2').innerText = p2.name;
        
        document.getElementById('menu').style.display = 'none';
        document.getElementById('game').style.display = 'flex';
        
        renderPad('pad1', 1);
        renderPad('pad2', 2);
        genQ(1); genQ(2);
        
        // Iniciar música de fondo tenue
        setInterval(() => {
            if(document.getElementById('game').style.display === 'flex') 
                playSound(220, 'triangle', 0.2);
        }, 3000);
    }

    function renderPad(id, p) {
        const container = document.getElementById(id);
        for(let i=1; i<=9; i++) {
            container.innerHTML += `<button class="btn" onclick="press(${p},${i})">${i}</button>`;
        }
        container.innerHTML += `<button class="btn btn-del" onclick="del(${p})">⌫</button>`;
        container.innerHTML += `<button class="btn" onclick="press(${p},0)">0</button>`;
        container.innerHTML += `<button class="btn btn-ok" onclick="check(${p})">OK</button>`;
    }

    function genQ(p) {
        let txt, res;
        const r = Math.random();

        if(config.level === 1) { // Rango hasta 30 y series
            if(r > 0.5) {
                let a = Math.floor(Math.random() * 20);
                let b = Math.floor(Math.random() * 10);
                txt = `${a}+${b}`; res = a + b;
            } else {
                let start = Math.floor(Math.random() * 28);
                txt = `${start}, ${start+1}, ?`; res = start + 2;
            }
        } else if(config.level === 2) {
            let a = Math.floor(Math.random() * 50);
            let b = Math.floor(Math.random() * 30);
            if(r > 0.5) { txt = `${a}+${b}`; res = a+b; }
            else { txt = Math.max(a,b)+"-"+Math.min(a,b); res = Math.abs(a-b); }
        } else {
            let a = Math.floor(Math.random() * 9) + 2;
            let b = Math.floor(Math.random() * 9) + 1;
            txt = `${a}×${b}`; res = a * b;
        }

        if(p === 1) { p1.res = res; p1.ans = ""; } 
        else { p2.res = res; p2.ans = ""; }
        
        document.getElementById(`q${p}`).innerText = txt;
        updateUI();
    }

    function press(p, n) {
        if(p === 1 && p1.ans.length < 3) p1.ans += n;
        if(p === 2 && p2.ans.length < 3) p2.ans += n;
        updateUI();
    }

    function del(p) {
        if(p === 1) p1.ans = p1.ans.slice(0,-1);
        else p2.ans = p2.ans.slice(0,-1);
        updateUI();
    }

    function updateUI() {
        document.getElementById('a1').innerText = p1.ans;
        document.getElementById('a2').innerText = p2.ans;
    }

    function check(p) {
        const val = parseInt(p === 1 ? p1.ans : p2.ans);
        const correctVal = (p === 1 ? p1.res : p2.res);
        const name = (p === 1 ? p1.name : p2.name);

        if(val === correctVal) {
            playSound(800, 'sine', 0.2);
            speak("Muy bien " + name);
            move(p);
            genQ(p);
        } else {
            playSound(150, 'sawtooth', 0.4);
            if(p === 1) p1.ans = ""; else p2.ans = "";
            const ui = document.getElementById(`ui${p}`);
            ui.style.background = "#ffcccc";
            setTimeout(() => ui.style.background = "white", 400);
            updateUI();
        }
    }

    function move(p) {
        const step = 40;
        config.pos += (p === 1 ? -step : step);
        
        const rope = document.getElementById('rope-visual');
        const c1 = document.getElementById('char1');
        const c2 = document.getElementById('char2');

        const transform = `translateX(${config.pos}px)`;
        rope.style.transform = transform;
        c1.style.transform = transform + (p === 1 ? ' rotate(-15deg)' : '');
        c2.style.transform = transform + (p === 2 ? ' rotate(15deg)' : '');

        // Quitar inclinación tras un momento
        setTimeout(() => {
            c1.style.transform = transform;
            c2.style.transform = transform;
        }, 500);

        if(Math.abs(config.pos) >= config.target) {
            const winner = (config.pos < 0 ? p1.name : p2.name);
            document.getElementById('win-text').innerHTML = `⭐ ¡FELICIDADES! ⭐<br>${winner}`;
            document.getElementById('victory-screen').style.display = 'flex';
            speak("¡Felicidades " + winner + "! Has ganado el juego.");
        }
    }
</script>
</body>
</html>
