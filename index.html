<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tira y Afloja Matemático</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f0f8ff;
overflow:hidden;
}

#menu{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#87CEEB;
}

.ageBtn{
font-size:28px;
padding:20px 40px;
margin:10px;
border:none;
border-radius:15px;
background:#ffcc00;
cursor:pointer;
}

#game{
display:none;
width:100vw;
height:100vh;
}

#container{
display:grid;
grid-template-columns:1fr 400px 1fr;
height:100%;
}

.player{
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
padding-top:20px;
}

.question{
font-size:36px;
margin:20px;
}

.answer{
font-size:40px;
height:50px;
margin-bottom:10px;
}

.keypad{
display:grid;
grid-template-columns:repeat(3,80px);
gap:10px;
}

.key{
font-size:28px;
padding:20px;
border:none;
border-radius:12px;
background:#ff7f50;
color:white;
cursor:pointer;
}

.ok{
grid-column:span 3;
background:#4CAF50;
}

#arena{
position:relative;
background:#e6f7ff;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

#rope{
position:absolute;
height:8px;
background:brown;
width:600px;
transition:transform .5s;
}

.character{
position:absolute;
font-size:60px;
transition:transform .5s;
}

#char1{
left:120px;
}

#char2{
right:120px;
}

.flashGreen{
animation:greenFlash .4s;
}

.flashRed{
animation:redFlash .4s;
}

@keyframes greenFlash{
0%{background:#7CFC00}
100%{background:transparent}
}

@keyframes redFlash{
0%{background:#ff4d4d}
100%{background:transparent}
}

#winner{
position:absolute;
top:40%;
width:100%;
text-align:center;
font-size:60px;
display:none;
}

</style>
</head>

<body>

<div id="menu">
<h1>🎮 Tira y Afloja Matemático</h1>
<h2>Elige edad</h2>
<button class="ageBtn" onclick="startGame(1)">3 - 5 años</button>
<button class="ageBtn" onclick="startGame(2)">6 - 8 años</button>
<button class="ageBtn" onclick="startGame(3)">9 - 10 años</button>
</div>

<div id="game">
<div id="container">

<div class="player" id="p1">
<div class="question" id="q1"></div>
<div class="answer" id="a1"></div>
<div class="keypad" id="k1"></div>
</div>

<div id="arena">
<div id="rope"></div>
<div class="character" id="char1">🧒</div>
<div class="character" id="char2">🧒</div>
<div id="winner"></div>
</div>

<div class="player" id="p2">
<div class="question" id="q2"></div>
<div class="answer" id="a2"></div>
<div class="keypad" id="k2"></div>
</div>

</div>
</div>

<script>

let level=1
let ans1=""
let ans2=""
let correct1=0
let correct2=0
let pos=0

function startGame(l){
level=l
document.getElementById("menu").style.display="none"
document.getElementById("game").style.display="block"

createKeypad("k1",1)
createKeypad("k2",2)

newQuestion(1)
newQuestion(2)
}

function createKeypad(id,player){

let keypad=document.getElementById(id)

for(let i=1;i<=9;i++){
let b=document.createElement("button")
b.className="key"
b.innerText=i
b.onclick=()=>press(player,i)
keypad.appendChild(b)
}

let zero=document.createElement("button")
zero.className="key"
zero.innerText="0"
zero.onclick=()=>press(player,0)
keypad.appendChild(zero)

let ok=document.createElement("button")
ok.className="key ok"
ok.innerText="OK"
ok.onclick=()=>check(player)
keypad.appendChild(ok)
}

function press(player,num){

if(player==1){
ans1+=num
document.getElementById("a1").innerText=ans1
}else{
ans2+=num
document.getElementById("a2").innerText=ans2
}

}

let q1=0
let q2=0

function newQuestion(player){

let q=generateQuestion()

if(player==1){
q1=q.answer
document.getElementById("q1").innerText=q.text
ans1=""
document.getElementById("a1").innerText=""
}else{
q2=q.answer
document.getElementById("q2").innerText=q.text
ans2=""
document.getElementById("a2").innerText=""
}

}

function generateQuestion(){

if(level==1){

let a=Math.floor(Math.random()*5)+1
let b=Math.floor(Math.random()*5)+1

if(Math.random()<0.5){
return {text:`${a} + ${b}`,answer:a+b}
}else{
return {text:`${a}, ${a+1}, ?`,answer:a+2}
}

}

if(level==2){

let a=Math.floor(Math.random()*50)+10
let b=Math.floor(Math.random()*50)

if(Math.random()<0.5){
return {text:`${a} + ${b}`,answer:a+b}
}else{
return {text:`${a} - ${b}`,answer:a-b}
}

}

if(level==3){

let a=Math.floor(Math.random()*9)+2
let b=Math.floor(Math.random()*9)+2

if(Math.random()<0.5){
return {text:`${a} × ${b}`,answer:a*b}
}else{
return {text:`${a*b} ÷ ${a}`,answer:b}
}

}

}

function check(player){

if(player==1){

if(Number(ans1)==q1){
move(1)
flash("p1",true)
}else{
flash("p1",false)
}
newQuestion(1)

}else{

if(Number(ans2)==q2){
move(2)
flash("p2",true)
}else{
flash("p2",false)
}
newQuestion(2)

}

}

function move(player){

let step=40

if(player==1){
pos+=step
}else{
pos-=step
}

document.getElementById("rope").style.transform=`translateX(${pos}px)`
document.getElementById("char1").style.transform=`translateX(${pos}px)`
document.getElementById("char2").style.transform=`translateX(${pos}px)`

if(pos>200){
win("Jugador 1")
}

if(pos<-200){
win("Jugador 2")
}

}

function flash(id,good){

let el=document.getElementById(id)

if(good){
el.classList.add("flashGreen")
setTimeout(()=>el.classList.remove("flashGreen"),400)
}else{
el.classList.add("flashRed")
setTimeout(()=>el.classList.remove("flashRed"),400)
}

}

function win(text){

let w=document.getElementById("winner")
w.innerText="🏆 "+text+" gana!"
w.style.display="block"

}

</script>

</body>
</html>
